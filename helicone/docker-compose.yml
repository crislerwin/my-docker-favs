version: "3.8"

name: helicone

services:
  # Core Infrastructure (without MinIO - using Umbrel MinIO)
  postgres:
    image: postgres:15
    container_name: helicone-postgres
    environment:
      POSTGRES_DB: helicone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helicone}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: helicone-clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: helicone
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-helicone}
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  redis:
    image: redis:7-alpine
    container_name: helicone-redis
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-helicone}

  # Note: MinIO is running on Umbrel (port 9000)
  # No MinIO service here - using external Umbrel MinIO

  # Optional: Mailhog for testing emails
  # Uncomment if you need email testing
  # mailhog:
  #   image: mailhog/mailhog:latest
  #   container_name: helicone-mailhog
  #   ports:
  #     - "${MAILHOG_SMTP_PORT:-1025}:1025"
  #     - "${MAILHOG_WEB_PORT:-8025}:8025"
  #   restart: unless-stopped

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
  # minio_data removed - using external MinIO

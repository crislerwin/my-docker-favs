version: "3.7"

services:
  # --- Grafana + Loki + Tempo + Mimir (all-in-one) ---
  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: lgtm
    environment:
      - ENABLE_LOGS_GRAFANA=true
      - GF_SERVER_HTTP_PORT=3000
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"    # Grafana UI
      - "3100:3100"    # Loki API
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    volumes:
      - ./data/lgtm:/data
    restart: unless-stopped

  # --- Alloy Log Collector (Host Docker) ---
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    user: "0:0"
    environment:
      ALLOY_CONFIG: |
        discovery.docker "host" {
          host = "unix:///var/run/docker.sock"
        }
        discovery.relabel "host_containers" {
          targets = discovery.docker.host.targets
          rule {
            source_labels = ["__meta_docker_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_docker_container_image"]
            target_label  = "image"
          }
          rule {
            target_label = "source"
            replacement  = "host-docker"
          }
        }
        loki.source.docker "host" {
          host       = "unix:///var/run/docker.sock"
          targets    = discovery.relabel.host_containers.output
          forward_to = [loki.write.lgtm.receiver]
        }
        loki.write "lgtm" {
          endpoint {
            url = "http://lgtm:3100/loki/api/v1/push"
          }
        }
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "$$ALLOY_CONFIG" > /tmp/config.alloy
        /bin/alloy run --server.http.listen-addr=0.0.0.0:12345 /tmp/config.alloy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - lgtm
    restart: unless-stopped

